name: media_cleaner
description: "Pulisci la tua galleria: elimina duplicati, blur, screenshot e video inutili."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  fluentui_system_icons: ^1.1.244
  intl: ^0.19.0
  photo_manager: ^3.9.0
  flutter_card_swiper: ^7.2.0
  video_player: ^2.9.2
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  get: ^4.7.3
  google_fonts: ^8.0.2
  flutter_launcher_icons: ^0.13.1
  fl_chart: ^0.70.0
  image: ^4.3.0
  lottie: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0D0F14"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21


flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/lottie/